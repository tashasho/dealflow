name: Daily dealflow run

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC daily
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not post to Slack)'
        required: false
        default: 'false'
      sources:
        description: 'Comma-separated sources (default: all). e.g. github,product_hunt'
        required: false
        default: ''
      limit:
        description: 'Max items per source'
        required: false
        default: '20'

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'openai/gpt-4o-mini' }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL || 'C0B3HUF3LRJ' }}
          GITHUB_TOKEN: ${{ secrets.DEALFLOW_GITHUB_TOKEN }}
          SCORE_THRESHOLD: ${{ vars.SCORE_THRESHOLD || '75' }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.sources }}" ]; then
            for s in $(echo "${{ github.event.inputs.sources }}" | tr ',' ' '); do
              ARGS="$ARGS -s $s"
            done
          fi
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$LIMIT" ]; then LIMIT=20; fi
          ARGS="$ARGS --limit $LIMIT"
          python -m src.cli run $ARGS

      - name: Persist deals.db
        if: github.event.inputs.dry_run != 'true'
        run: |
          if [ -f data/deals.db ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f data/deals.db
            if ! git diff --cached --quiet; then
              git commit -m "chore: update deals.db [skip ci]"
              git push
            fi
          fi
